name: chip_dependencies
description: ChipFit Dependencies - Central dependency management
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.5.3
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  # --- 상태 관리 ---
  flutter_bloc: ^9.1.1
  bloc_event_transformers: ^2.0.0
  equatable: ^2.0.7

  # --- 데이터 모델링 ---
  freezed_annotation: ^3.0.0

  # --- 네트워크 ---
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- 코드 생성 ---
  build_runner: ^2.13.1
  freezed: ^3.2.5
  flutter_gen_runner: ^5.13.0

  # --- Lint ---
  flutter_lints: ^6.0.0
