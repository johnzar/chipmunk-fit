name: chipfit
description: "ChipmunkStudio DesignSystem"
publish_to: 'none'
version: 1.0.0
homepage: https://github.com/chipmunk-studio/chipmunk-fit

environment:
  sdk: ^3.5.3

workspace:
  - chip_component
  - chip_foundation
  - chip_module
  - chip_assets
  - chip_dependencies
  - chip_core
  - catalog

dependencies:
  flutter:
    sdk: flutter
  chip_assets:
    path: ./chip_assets
  chip_foundation:
    path: ./chip_foundation
  chip_component:
    path: ./chip_component
  chip_module:
    path: ./chip_module
  chip_core:
    path: ./chip_core
  chip_dependencies:
    path: ./chip_dependencies

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner:
  melos: ^7.1.0

melos:
  scripts:
    # ==================== 의존성 관리 ====================

    get:
      run: melos exec --concurrency=1 -- "flutter pub get"
      description: Run "flutter pub get" in all packages.

    clean:
      run: melos exec --concurrency=10 -- "flutter clean"
      description: Run "flutter clean" in all packages.

    # ==================== 코드 생성 ====================

    build:
      run: |
        dart run build_runner build --delete-conflicting-outputs &
        root_pid=$!
        melos exec --depends-on="build_runner" --concurrency=10 -- "dart run build_runner build --delete-conflicting-outputs"
        wait $root_pid
      description: Run build_runner in the main app and all packages in parallel.

    build:all:
      run: melos exec --concurrency=10 -- "dart run build_runner build --delete-conflicting-outputs" || true
      description: Run build_runner for all packages including those with build_runner in dev_dependencies.

    build:main:
      run: dart run build_runner build --delete-conflicting-outputs
      description: Run build_runner in the main app for .g.dart and .freezed.dart files.

    build:component:
      run: melos exec --scope="chip_component" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner in the component module.

    build:foundation:
      run: melos exec --scope="chip_foundation" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner in the foundation module.

    build:module:
      run: melos exec --scope="chip_module" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner in the module module.

    build:assets:
      run: melos exec --scope="chip_assets" -- "fluttergen -c pubspec.yaml"
      description: Run build_runner in the chip_assets module.

    build:catalog:
      run: melos exec --scope="catalog" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner in the catalog module.

    # ==================== 테스트 & 린트 ====================

    test:
      run: melos exec -- "flutter test"
      description: Run "flutter test" in all packages.

    lint:
      run: melos exec -- "flutter analyze"
      description: Run lint analysis on all packages.

    lint:error:
      run: melos exec -- "flutter analyze --fatal-infos"
      description: Run lint analysis and fail on any issues.

    lint:fix:
      run: |
        dart fix --apply &
        root_pid=$!
        melos exec --concurrency=10 -- "dart fix --apply"
        wait $root_pid
      description: Automatically fix lint issues in the main app and all packages.

    lint:component:
      run: melos exec --scope="chip_component" -- "flutter analyze"
      description: Run lint analysis on component package.

    lint:foundation:
      run: melos exec --scope="chip_foundation" -- "flutter analyze"
      description: Run lint analysis on foundation package.

    lint:module:
      run: melos exec --scope="chip_module" -- "flutter analyze"
      description: Run lint analysis on module package.

    gen:
      run: melos exec --scope="chip_assets" -- "fluttergen -c pubspec.yaml"
      description: Run flutter_gen for chip_assets module.

    # ==================== 프로젝트 초기화 ====================

    reset:
      run: ./clean.sh
      description: Clean and rebuild entire project without upgrades.

    reset:upgrade:
      run: ./clean.sh --upgrade
      description: Clean, rebuild and upgrade Flutter SDK.

    reset:upgrade-packages:
      run: ./clean.sh --upgrade-packages
      description: Clean, rebuild and upgrade packages.

    reset:upgrade-all:
      run: ./clean.sh --upgrade-all
      description: Clean, rebuild and upgrade everything.
